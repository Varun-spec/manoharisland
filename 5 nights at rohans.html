<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rohan Night – Final</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #050505 0%, #000 65%);
      position: relative;
      overflow: hidden;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 40%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.95) 100%);
      mix-blend-mode: multiply;
    }
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 90' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n' x='-20%25' y='-20%25' width='140%25' height='140%25'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='noStitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.25'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/%3E%3C/svg%3E");
      opacity: 0.25;
      mix-blend-mode: soft-light;
      animation: grainMove 1.8s steps(3) infinite;
    }
    @keyframes grainMove {
      0%   { transform: translate(0,0); }
      50%  { transform: translate(-10px, 5px); }
      100% { transform: translate(0,0); }
    }

    #office {
      width: 1100px;
      height: 620px;
      border: 3px solid #0f0;
      background: url("office.png") center/cover no-repeat;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,255,0,0.35), 0 0 80px #000;
    }

    #doorPanel {
      position: absolute;
      left: 30px;
      top: 180px;
      width: 120px;
      height: 220px;
      border: 2px solid #0f0;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 8;
      box-shadow: 0 0 10px rgba(0,255,0,0.4);
    }
    #doorLabel {
      font-size: 13px;
      letter-spacing: 1px;
    }
    #doorSwitch {
      width: 70px;
      height: 100px;
      border: 2px solid #0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
      background: radial-gradient(circle at 50% 20%, #333 0%, #000 70%);
      text-shadow: 0 0 4px #000;
    }

    #doorBlockLeft,
    #doorBlockRight {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 150px;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
      border-right: 2px solid #050;
      border-left: 2px solid #050;
      box-shadow: inset 0 0 15px #000;
      z-index: 3;
      transition: transform 0.5s ease-in-out;
    }
    #doorBlockLeft {
      left: 0;
      transform: translateX(-100%);
    }
    #doorBlockRight {
      right: 0;
      transform: translateX(100%);
    }
    #office.doorClosed #doorBlockLeft {
      transform: translateX(0);
    }
    #office.doorClosed #doorBlockRight {
      transform: translateX(0);
    }

    #rohanBehind {
      position: absolute;
      left: 50%;
      top: 60px;
      transform: translateX(-50%);
      width: 760px;
      height: 440px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
      overflow: hidden;
      filter: contrast(1.1) saturate(0.9);
    }
    #rohanBehind img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #monitor {
      position: absolute;
      left: 50%;
      top: 60px;
      transform: translateX(-50%);
      width: 780px;
      height: 460px;
      border: 3px solid #0f0;
      background: radial-gradient(circle at center, #050505 0%, #000 80%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow:
        0 0 20px rgba(0,255,0,0.8),
        0 0 60px rgba(0,0,0,0.9);
      z-index: 10;
      overflow: hidden;
    }
    #monitor::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 40%, transparent 60%, rgba(0,0,0,0.6));
      mix-blend-mode: soft-light;
      pointer-events: none;
      opacity: 0.4;
    }

    @keyframes screenShake {
      0%   { transform: translateX(-50%) translateY(0); }
      20%  { transform: translateX(-52%) translateY(-3px); }
      40%  { transform: translateX(-48%) translateY(3px); }
      60%  { transform: translateX(-51%) translateY(-2px); }
      80%  { transform: translateX(-49%) translateY(2px); }
      100% { transform: translateX(-50%) translateY(0); }
    }
    #monitor.shake {
      animation: screenShake 0.35s ease;
    }

    #camView {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #camImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      inset: 0;
      display: none;
      filter: contrast(1.1) grayscale(0.3);
      background: #000;
    }

    #camStaticOverlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.18),
          rgba(255,255,255,0.18) 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 4px
        );
      mix-blend-mode: screen;
      opacity: 0;
      animation: staticNoise 0.25s steps(3) infinite;
    }
    @keyframes staticNoise {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 2px); }
      50%  { transform: translate(2px, -3px); }
      75%  { transform: translate(-2px, -1px); }
      100% { transform: translate(1px, 2px); }
    }

    #scanline {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      mix-blend-mode: soft-light;
      opacity: 0.16;
      pointer-events: none;
      z-index: 6;
      animation: scanMove 3s linear infinite;
    }
    @keyframes scanMove {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    #moGlitch {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 7;
      pointer-events: none;
    }
    #moGlitchImg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.85;
      filter: contrast(1.2) saturate(1.1);
      mix-blend-mode: screen;
    }
    .moGlitchStatic {
      position: absolute;
      inset: -4px;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.2),
          rgba(255,255,255,0.2) 1px,
          rgba(0,0,0,0.25) 1px,
          rgba(0,0,0,0.25) 3px
        );
      opacity: 0.5;
      mix-blend-mode: screen;
      clip-path: polygon(0 0, 100% 0, 100% 18%, 0 25%);
    }
    .moGlitchStatic.layer2 {
      clip-path: polygon(0 40%, 100% 35%, 100% 80%, 0 85%);
      opacity: 0.45;
    }
    .moGlitchActive {
      animation: moGlitchAnim 0.25s steps(2) 0s 2;
    }
    @keyframes moGlitchAnim {
      0%   { transform: translate(0,0); filter: hue-rotate(0deg); }
      25%  { transform: translate(-3px,2px); filter: hue-rotate(10deg); }
      50%  { transform: translate(2px,-3px); filter: hue-rotate(-10deg); }
      75%  { transform: translate(-2px,-1px); filter: hue-rotate(5deg); }
      100% { transform: translate(1px,2px); filter: hue-rotate(0deg); }
    }

    #powerOverlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #000 0%, #000 60%, #020202 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #powerOverlay.visible {
      opacity: 1;
    }
    #powerOverlayInner {
      border: 1px solid #0f0;
      padding: 10px 20px;
      background: #010401;
      box-shadow: 0 0 10px rgba(0,255,0,0.6);
    }
    #powerOverlayText {
      font-size: 14px;
      letter-spacing: 2px;
      animation: powerBlink 0.8s steps(2) infinite;
    }
    @keyframes powerBlink {
      0%   { opacity: 1; }
      50%  { opacity: 0.3; }
      100% { opacity: 1; }
    }

    #monitorBottom {
      height: 80px;
      border-top: 2px solid #0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      font-size: 12px;
      position: relative;
      background: linear-gradient(to top, #020402, #060d06);
    }
    #camInfo {
      min-width: 160px;
      letter-spacing: 0.5px;
    }

    #powerButton {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 6px;
      padding: 6px 18px;
      border-radius: 20px;
      border: 2px solid #0f0;
      background: radial-gradient(circle at 50% 20%, #333 0%, #000 60%);
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 1px;
      text-shadow: 0 0 3px #000;
      box-shadow:
        0 3px 0 #020,
        0 0 10px rgba(0,255,0,0.6);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #powerButton::before {
      content: "⏻";
      font-size: 13px;
    }
    #powerButton:active {
      transform: translateX(-50%) translateY(2px);
      box-shadow:
        0 1px 0 #020,
        0 0 4px rgba(0,255,0,0.4) inset;
    }
    #powerButton.off {
      background: radial-gradient(circle at 50% 20%, #500 0%, #000 60%);
      color: #f88;
      border-color: #f44;
      box-shadow:
        0 3px 0 #200,
        0 0 10px rgba(255,0,0,0.7);
    }
    #powerButton.powerTransition {
      animation: powerPulse 0.7s ease-in-out infinite;
    }
    @keyframes powerPulse {
      0% { box-shadow: 0 3px 0 #020, 0 0 4px rgba(0,255,0,0.4); }
      50% { box-shadow: 0 3px 0 #020, 0 0 14px rgba(0,255,0,0.9); }
      100% { box-shadow: 0 3px 0 #020, 0 0 4px rgba(0,255,0,0.4); }
    }

    #map {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 200px;
      height: 74px;
      border: 1px solid #0f0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 2px;
      padding: 2px;
      background: rgba(0,0,0,0.7);
      box-shadow: 0 0 8px rgba(0,255,0,0.4);
    }
    .mapNode {
      border: 1px solid #0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      user-select: none;
      background: #050c05;
      color: #0f0;
      position: relative;
      text-shadow: 0 0 3px #000;
    }
    .mapNode.activeCam {
      background: #021a1a;
      box-shadow: 0 0 6px rgba(0,255,255,0.6);
    }

    #hud {
      position: absolute;
      right: 10px;
      top: 10px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #0f0;
      padding: 6px 10px;
      font-size: 13px;
      text-align: right;
      z-index: 20;
      box-shadow: 0 0 10px rgba(0,255,0,0.4);
    }
    #message {
      position: absolute;
      left: 10px;
      bottom: 10px;
      min-width: 160px;
      max-width: 280px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #0f0;
      padding: 6px 10px;
      font-size: 13px;
      color: #0f0;
      z-index: 20;
      box-shadow: 0 0 8px rgba(0,255,0,0.35);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #000 0%, #000 60%, #020202 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    #overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #elRobertoPeek {
      position: absolute;
      width: 120px;
      height: 160px;
      display: none;
      cursor: pointer;
      z-index: 35;
      transform-origin: center;
      filter: drop-shadow(0 0 10px rgba(255,0,0,0.6));
    }
    #elRobertoPeek img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #elRobertoPopup {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      background: rgba(0,0,0,0.92);
      border: 2px solid #0f0;
      padding: 12px;
      z-index: 15;
      display: none;
      font-size: 13px;
      box-shadow: 0 0 12px rgba(0,255,0,0.5);
    }
    #elRobertoPopup p {
      margin: 6px 0;
    }
    #elRobertoButtons {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .popupBtn {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      text-shadow: 0 0 3px #000;
    }
    .popupBtn:hover {
      background: #222;
    }

    #moHolo {
      position: absolute;
      right: 40px;
      top: 140px;
      width: 200px;
      height: 290px;
      display: none;
      opacity: 0;
      z-index: 30;
      pointer-events: none;
      filter:
        drop-shadow(0 0 12px rgba(0,255,255,0.8))
        saturate(0.8);
      mix-blend-mode: screen;
    }
    #moHolo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes moDefeat {
      0%   { opacity: 1; transform: scale(1); filter: blur(0); }
      40%  { opacity: 0.4; transform: scale(1.02); filter: blur(1px); }
      60%  { opacity: 0.9; transform: scale(0.98); filter: blur(0.5px); }
      100% { opacity: 0; transform: scale(0.94); filter: blur(2px); }
    }
    #moHolo.moDefeated {
      animation: moDefeat 0.45s ease-out forwards;
    }

    /* Rohan jumpscare overlays */
    #rohanPeekSmall {
      position: absolute;
      right: 40px;
      bottom: 80px;
      width: 90px;
      height: 120px;
      display: none;
      z-index: 45;
      filter: drop-shadow(0 0 10px rgba(0,255,0,0.7));
    }
    #rohanPeekSmall img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #rohanBlackCut {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
      z-index: 55;
    }
    #rohanStaticOverlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 60;
      background: #000;
      overflow: hidden;
    }
    #rohanStaticOverlay img {
      position: absolute;
      inset: 0;
      width: 95%;
      height: 95%;
      margin: auto;
      object-fit: cover;
      filter: contrast(1.5) saturate(1.1);
      mix-blend-mode: screen;
      transform-origin: center;
    }
    #rohanStaticImgGhost {
      opacity: 0.6;
      filter: contrast(1.2) saturate(1) hue-rotate(20deg);
      mix-blend-mode: lighten;
    }
    #rohanStaticImg.rohanChaos {
      animation: rohanChaosAnim 0.18s steps(2) infinite;
    }
    #rohanStaticImgGhost.rohanChaos2 {
      animation: rohanChaosAnim2 0.14s steps(2) infinite;
    }
    @keyframes rohanChaosAnim {
      0%   { transform: translate(-3px,-2px) scale(1.02,0.98) rotate(-2deg); }
      25%  { transform: translate(4px,3px) scale(0.97,1.03) rotate(3deg); }
      50%  { transform: translate(-2px,4px) scale(1.04,0.96) rotate(-1deg); }
      75%  { transform: translate(3px,-4px) scale(0.96,1.05) rotate(2deg); }
      100% { transform: translate(0px,0px) scale(1.02,0.98) rotate(0deg); }
    }
    @keyframes rohanChaosAnim2 {
      0%   { transform: translate(4px,-3px) scale(1.03,0.97) rotate(1deg); }
      50%  { transform: translate(-5px,4px) scale(0.96,1.04) rotate(-2deg); }
      100% { transform: translate(2px,1px) scale(1.01,0.99) rotate(0deg); }
    }
    #rohanStaticNoise1,
    #rohanStaticNoise2 {
      position: absolute;
      inset: -10px;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    #rohanStaticNoise1 {
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.25),
          rgba(255,255,255,0.25) 1px,
          rgba(0,0,0,0.25) 1px,
          rgba(0,0,0,0.25) 3px
        );
      opacity: 0.9;
      animation: rohanTVStatic1 0.11s steps(2) infinite;
    }
    #rohanStaticNoise2 {
      background-image:
        repeating-radial-gradient(
          circle at 17% 32%,
          rgba(255,255,255,0.9),
          rgba(0,0,0,0.9) 0.00085px
        );
      opacity: 0.5;
      animation: rohanTVStatic2 0.2s linear infinite;
    }
    #rohanStaticOverlay.flashing {
      animation: rohanFlash 0.07s steps(2) infinite;
    }
    @keyframes rohanTVStatic1 {
      0%   { transform: translate(0,0); }
      50%  { transform: translate(-6px,3px); }
      100% { transform: translate(3px,-4px); }
    }
    @keyframes rohanTVStatic2 {
      from { background-size: 100% 100%; }
      to   { background-size: 260% 260%; }
    }
    @keyframes rohanFlash {
      0%   { opacity: 1; }
      40%  { opacity: 0.7; }
      60%  { opacity: 1; }
      100% { opacity: 0.4; }
    }

    #itsMeText {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-size: 80px;
      color: #f00;
      text-shadow:
        0 0 10px rgba(255,0,0,0.9),
        0 0 25px rgba(255,0,0,0.8);
      letter-spacing: 0.15em;
      z-index: 70;
      opacity: 0;
      pointer-events: none;
    }
    #itsMeTextInner {
      border-right: 3px solid rgba(255,0,0,0.9);
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }
    #itsMeText.typing {
      animation: itsMeFlicker 0.12s steps(2) infinite;
    }
    #itsMeText.typing #itsMeTextInner {
      animation:
        itsMeType 1.6s steps(5, end) forwards,
        itsMeCaret 0.6s steps(2) infinite;
    }
    @keyframes itsMeType {
      from { width: 0; }
      to   { width: 8ch; }
    }
    @keyframes itsMeCaret {
      0%, 100% { border-color: rgba(255,0,0,0); }
      50%      { border-color: rgba(255,0,0,0.9); }
    }
    @keyframes itsMeFlicker {
      0%   { opacity: 0.2; transform: translate(0,0); }
      20%  { opacity: 1;   transform: translate(-1px,1px); }
      40%  { opacity: 0.6; transform: translate(1px,-1px); }
      60%  { opacity: 1;   transform: translate(0,0); }
      80%  { opacity: 0.4; transform: translate(2px,-2px); }
      100% { opacity: 1;   transform: translate(0,0); }
    }
    #itsMeText.glitch {
      animation: itsMeGlitch 0.25s steps(3) infinite;
    }
    @keyframes itsMeGlitch {
      0%   { transform: translate(0,0); text-shadow: 0 0 10px rgba(255,0,0,0.9); }
      25%  { transform: translate(-3px,1px); text-shadow: -2px 0 red, 2px 0 #0ff; }
      50%  { transform: translate(3px,-2px); text-shadow: 2px 0 red, -2px 0 #0ff; }
      75%  { transform: translate(-1px,2px); text-shadow: 0 0 15px rgba(255,0,0,1); }
      100% { transform: translate(0,0); text-shadow: 0 0 10px rgba(255,0,0,0.9); }
    }

    /* El Roberto jumpscare overlays */
    #elRobertoPeekSmall {
      position: absolute;
      left: 40px;
      bottom: 60px;
      width: 100px;
      height: 140px;
      display: none;
      z-index: 45;
      filter: drop-shadow(0 0 10px rgba(255,0,0,0.9));
    }
    #elRobertoPeekSmall img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #elRobertoBlackCut {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
      z-index: 55;
    }
    #elRobertoStaticOverlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 60;
      background: #000;
      overflow: hidden;
    }
    #elRobertoStaticOverlay img {
      position: absolute;
      inset: 0;
      width: 90%;
      height: 90%;
      margin: auto;
      object-fit: cover;
      filter: contrast(1.6) saturate(1.1);
      mix-blend-mode: screen;
      transform-origin: center;
    }
    #elRobertoStaticImgGhost {
      opacity: 0.7;
      filter: contrast(1.3) saturate(1) hue-rotate(-15deg);
      mix-blend-mode: lighten;
    }
    #elRobertoStaticImg.erChaos {
      animation: erChaosAnim 0.16s steps(2) infinite;
    }
    #elRobertoStaticImgGhost.erChaos2 {
      animation: erChaosAnim2 0.13s steps(2) infinite;
    }
    @keyframes erChaosAnim {
      0%   { transform: translate(-4px,1px) scale(1.03,0.97) rotate(3deg); }
      25%  { transform: translate(5px,-3px) scale(0.96,1.04) rotate(-4deg); }

  function timeFromTick(tick) {
    const totalSeconds = NIGHT_LENGTH_MINUTES * 60;
    const remainingSeconds = Math.max(0, totalSeconds - tick);
    const mm = Math.floor(remainingSeconds / 60);
    const ss = Math.floor(remainingSeconds % 60);
    return `${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  function hourFromTick(tick) {
    const hourFloat = 12 + (tick / TICKS_PER_HOUR);
    return Math.min(6, Math.floor(hourFloat));
  }

  function setMessage(text, color = "#0f0", type = "generic") {
    const isTutorial = (type === "tutorial");
    const isFootstep = (type === "footstep");
    if (night > 3 && isTutorial && !isFootstep) return;
    msg.style.color = color;
    msg.textContent = text;
  }
  function tutorial(text) {
    setMessage(text, "#0f0", "tutorial");
  }
  function footstepMsg(text) {
    setMessage(text, "orange", "footstep");
  }

  function updateHUD() {
    const hour = hourFromTick(currentTick);

  function randomNextCam(fromCam) {

    const closer = neighbors.filter(n => n < fromCam);
    if (closer.length > 0 && Math.random() < 0.7) {
      return closer[Math.floor(Math.random() * closer.length)];
    }
    return neighbors[Math.floor(Math.random() * neighbors.length)];
  }

  function startNight() {
    resetNightState();

    if (loopId !== null) clearInterval(loopId);

    const minTick = Math.floor(TOTAL_TICKS * 0.25);
    const maxTick = Math.floor(TOTAL_TICKS * 0.75);
    nextPowerSpikeTick = Math.floor(Math.random() * (maxTick - minTick)) + minTick;
    spikeUsedThisNight = false;

    loopId = setInterval(() => {
      if (gameOver) return;

      currentTick++;

      const difficultyMultiplier = 1 + (night - 1) * POWER_INCREASE_PER_NIGHT;
      if (!powerOut) {
        if (computerOn) {
          power -= BASE_IDLE_DRAIN * difficultyMultiplier;
          if (doorClosed) power -= BASE_DOOR_EXTRA_DRAIN * difficultyMultiplier;
        } else {
          power -= BASE_COMPUTER_OFF_DRAIN * difficultyMultiplier;
        }
      }

      if (!powerOut && !spikeUsedThisNight && currentTick >= nextPowerSpikeTick) {
        if (computerOn && doorClosed) {
          const spikeAmount = 7 + Math.floor(Math.random() * 6);
          power -= spikeAmount;
          tutorial("Power surge! " + spikeAmount + "% lost.");
        }
        spikeUsedThisNight = true;
      }

      if (power <= 0 && !powerOut) {
        power = 0;
        triggerPowerOut();
      }

      if (!powerOut) {
        const hour = hourFromTick(currentTick);
        const hourAggressionBonus = (hour - 12) * 0.02;
        const nightAggressionBonus = (night - 1) * 0.015;
        const rohanChance =
          ROHAN_BASE_MOVE_CHANCE_PER_TICK +
          hourAggressionBonus +
          nightAggressionBonus;

        if (Math.random() < Math.min(0.45, rohanChance)) {
          moveRohan();
        }
      }

      maybeTriggerElRobertoPopup();

      if (currentTick >= TOTAL_TICKS && !gameOver) {
        endNightTransition();
        return;
      }

      updateHUD();
    }, TICK_MS);
  }

        }

    }, 1500);
  }

      }, 700);
    } else {
      powerOverlay.style.display = "flex";
      powerOverlay.classList.add("visible");
      powerOverlayText.textContent = "STARTING UP...";
      tutorial("Computer starting up...");

      setTimeout(() => {
        computerOn = true;
        powerButton.classList.remove("off");
        powerButton.textContent = "POWER: ON";
        tutorial("Computer ON – you can see the cams.");

        updateCamView();
        updateMap();
        updateHUD();

        setTimeout(() => {
          powerOverlay.classList.remove("visible");
          setTimeout(() => {
            powerOverlay.style.display = "none";
            powerButton.classList.remove("powerTransition");
            powerTransitionInProgress = false;
          }, 300);
        }, 200);
      }, 900);
    }
  };

  playAgainBtn.onclick = () => {
    night = 1;
    startNight();
  };

  createMap();
  updateMap();
  startNight();
</script>
</body>
</html>
