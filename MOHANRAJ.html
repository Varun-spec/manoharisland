<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Joint Drawing Canvas – Gartic Mode</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 10px;
      font-family: sans-serif;
      background: #1f1f1f;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h1 { margin: 10px 0 0 0; text-align: center; }
    button {
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      background: #333;
      color: #f5f5f5;
      transition: background 0.15s ease;
    }
    button:hover { background: #444; }
    button.primary { background: #007bff; }
    button.primary:hover { background: #1a88ff; }

    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }
    #loginBox {
      background: #222;
      padding: 20px 24px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      max-width: 320px;
      width: 90%;
    }
    #loginBox h2 { margin: 0 0 10px 0; }
    #usernameInput {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #555;
      font-size: 14px;
    }

    #lobbyScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20px;
    }
    #lobbyBox {
      background: #222;
      border-radius: 8px;
      padding: 16px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 8px rgba(0,0,0,0.5);
    }
    #lobbyBox h2 { margin: 0 0 8px 0; }
    #roomList {
      max-height: 220px;
      overflow-y: auto;
      background: #111;
      border-radius: 6px;
      padding: 6px;
      border: 1px solid #333;
      margin-bottom: 10px;
    }
    .roomRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #222;
    }
    .roomRow:last-child { border-bottom: none; }
    .roomName { font-weight: bold; }
    #createRoomRow {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    #newRoomInput {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #111;
      color: #f5f5f5;
      font-size: 14px;
    }
    #lobbyInfo {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    #appScreen {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #userLabel, #roomLabel, #info {
      font-size: 13px;
      opacity: 0.9;
      text-align: center;
      margin: 3px 0;
    }
    #info { color: #ccc; }

    #mainRow {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }
    #leftPane {
      flex: 2.7;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }
    #rightPane {
      flex: 1.3;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #333;
      padding-left: 10px;
      min-width: 260px;
      max-width: 360px;
    }

    #topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
      flex-wrap: wrap;
    }
    #topbar > * { margin: 2px; }
    label { font-size: 13px; }
    #colorPicker {
      width: 40px;
      height: 32px;
      padding: 0;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    #brushSize { width: 100px; }

    #canvasWrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    #drawCanvas, #cursorCanvas {
      border: 2px solid #555;
      background: #ffffff;
      border-radius: 4px;
      touch-action: none;
      display: block;
      max-width: 100%;
      height: auto;
    }
    #cursorCanvas {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
      background: transparent;
    }

    #bottomButtons {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #chatTitle { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
    #chatBox {
      flex: 1.2;
      background: #111;
      border-radius: 6px;
      padding: 6px;
      overflow-y: auto;
      font-size: 13px;
      border: 1px solid #333;
      margin-bottom: 6px;
      min-height: 0;
    }
    .chatMessage { margin-bottom: 4px; word-wrap: break-word; }
    .chatUser { font-weight: bold; }
    .chatSystem { font-style: italic; color: #aaa; }
    #chatInputRow {
      display: flex;
      margin-top: 2px;
      gap: 6px;
    }
    #chatInput {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #f5f5f5;
      font-size: 13px;
    }

    #emojiRow {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .emojiBtn {
      font-size: 16px;
      padding: 4px 8px;
      background: #222;
    }
    .emojiBtn:hover { background: #333; }

    #onlineTitle {
      font-size: 14px;
      font-weight: bold;
      margin: 6px 0 4px 0;
    }
    #onlineList {
      flex: 0.6;
      background: #111;
      border-radius: 6px;
      padding: 6px;
      border: 1px solid #333;
      font-size: 13px;
      overflow-y: auto;
      min-height: 0;
    }
    .onlineUser {
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .onlineColorDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #gameControls {
      margin-top: 8px;
      padding: 6px;
      background: #111;
      border-radius: 6px;
      border: 1px solid #333;
      font-size: 12px;
    }
    #phaseLabel { font-weight: bold; margin-bottom: 4px; }
    #gameInputs { margin-top: 4px; }
    #promptInput, #guessInput {
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #f5f5f5;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #submitStepBtn {
      width: 100%;
      margin-top: 2px;
    }
    #hostControls {
      margin-top: 6px;
    }

    .floating-emoji {
      position: fixed;
      font-size: 28px;
      pointer-events: none;
      animation: floatUp 1.8s ease-out forwards;
      z-index: 15;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-140px); opacity: 0; }
    }

    #replayOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    #replayBox {
      background: #222;
      padding: 16px;
      border-radius: 8px;
      max-width: 800px;
      width: 95%;
      max-height: 90vh;
      overflow: auto;
    }
    #replayBox h2 { margin-top: 0; }
    .replayChain {
      margin-bottom: 14px;
      border-bottom: 1px solid #444;
      padding-bottom: 8px;
    }
    .replayStepPrompt { color: #f1c40f; }
    .replayStepGuess { color: #1abc9c; }
    .replayImage {
      max-width: 100%;
      border: 1px solid #555;
      border-radius: 4px;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <!-- Username -->
  <div id="loginOverlay">
    <div id="loginBox">
      <h2>Welcome</h2>
      <p>Pick a username:</p>
      <input id="usernameInput" type="text" placeholder="e.g. Aryan" maxlength="20">
      <button id="joinBtn" class="primary">Continue</button>
    </div>
  </div>

  <!-- Lobby -->
  <div id="lobbyScreen">
    <h1>Joint Drawing Rooms</h1>
    <div id="lobbyBox">
      <h2>Lobby</h2>
      <div id="roomList"></div>
      <div id="createRoomRow">
        <input id="newRoomInput" type="text" placeholder="New room name (e.g. chill)" maxlength="20">
        <button id="createRoomBtn" class="primary">Create</button>
      </div>
      <div id="lobbyInfo">All rooms are public. Click any room to join it.</div>
    </div>
  </div>

  <!-- App -->
  <div id="appScreen">
    <h1>Joint Drawing Canvas – Mini Gartic</h1>
    <p id="userLabel"></p>
    <p id="roomLabel"></p>
    <div id="info"></div>

    <div id="mainRow">
      <div id="leftPane">
        <div id="topbar">
          <label>
            Color
            <input type="color" id="colorPicker" value="#000000">
          </label>
          <label>
            Brush size
            <input type="range" id="brushSize" min="1" max="40" value="4">
            <span id="brushSizeValue">4</span> px
          </label>
          <button id="penBtn" class="active">Pen</button>
          <button id="eraserBtn">Eraser</button>
          <button id="eraseAllBtn">Erase All</button>
        </div>

        <div id="canvasWrapper">
          <canvas id="drawCanvas" width="900" height="520"></canvas>
          <canvas id="cursorCanvas" width="900" height="520"></canvas>
        </div>

        <div id="bottomButtons">
          <button id="downloadBtn">Download PNG</button>
          <button id="backToLobbyBtn">Back to Lobby</button>
        </div>
      </div>

      <div id="rightPane">
        <div id="chatTitle">Chat</div>
        <div id="chatBox"></div>
        <div id="chatInputRow">
          <input id="chatInput" type="text" placeholder="Type a message and press Enter">
          <button id="sendChatBtn">Send</button>
        </div>

        <div id="emojiRow">
          <button class="emojiBtn" data-emoji="🎉">🎉</button>
          <button class="emojiBtn" data-emoji="😂">😂</button>
          <button class="emojiBtn" data-emoji="❤️">❤️</button>
          <button class="emojiBtn" data-emoji="🔥">🔥</button>
        </div>

        <div id="onlineTitle">Online (best-effort)</div>
        <div id="onlineList"></div>

        <div id="gameControls">
          <div id="phaseLabel">Phase: Free draw</div>
          <div id="gameHint"></div>
          <div id="gameInputs">
            <input id="promptInput" type="text" placeholder="Type your prompt..." style="display:none;">
            <input id="guessInput" type="text" placeholder="Type your guess..." style="display:none;">
            <button id="submitStepBtn" class="primary" style="display:none;">Submit</button>
          </div>
          <div id="hostControls">
            <!-- NO HOST LOGIC: everyone sees this -->
            <button id="startGameBtn" class="primary">Start Mini Gartic Game</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Replay -->
  <div id="replayOverlay">
    <div id="replayBox">
      <h2>Game Replay</h2>
      <div id="replayContent"></div>
      <button id="closeReplayBtn" class="primary" style="margin-top:8px;">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pubnub@7.5.0/dist/web/pubnub.min.js"></script>
  <script>
    const LOBBY_CHANNEL = "joint-drawing-lobby";
    let ROOM_CHANNEL = null;
    let CURRENT_ROOM = null;

    const pubnub = new PubNub({
      publishKey:   "pub-c-fc766aca-9661-4f55-bc9a-667c55e2b5c1",
      subscribeKey: "sub-c-1dd042db-ecfa-47ad-8d2c-4ecb39394c0b",
      uuid: "temp_" + Math.floor(Math.random() * 1e9)
    });

    const loginOverlay = document.getElementById("loginOverlay");
    const usernameInput = document.getElementById("usernameInput");
    const joinBtn = document.getElementById("joinBtn");

    const lobbyScreen = document.getElementById("lobbyScreen");
    const roomListDiv = document.getElementById("roomList");
    const newRoomInput = document.getElementById("newRoomInput");
    const createRoomBtn = document.getElementById("createRoomBtn");

    const appScreen = document.getElementById("appScreen");
    const userLabel = document.getElementById("userLabel");
    const roomLabel = document.getElementById("roomLabel");
    const info = document.getElementById("info");

    const drawCanvas = document.getElementById("drawCanvas");
    const drawCtx = drawCanvas.getContext("2d");
    const cursorCanvas = document.getElementById("cursorCanvas");
    const cursorCtx = cursorCanvas.getContext("2d");

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const brushSizeValue = document.getElementById("brushSizeValue");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const eraseAllBtn = document.getElementById("eraseAllBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const backToLobbyBtn = document.getElementById("backToLobbyBtn");

    const chatBox = document.getElementById("chatBox");
    const chatInput = document.getElementById("chatInput");
    const sendChatBtn = document.getElementById("sendChatBtn");
    const emojiButtons = document.querySelectorAll(".emojiBtn");

    const onlineList = document.getElementById("onlineList");

    const phaseLabel = document.getElementById("phaseLabel");
    const gameHint = document.getElementById("gameHint");
    const promptInput = document.getElementById("promptInput");
    const guessInput = document.getElementById("guessInput");
    const submitStepBtn = document.getElementById("submitStepBtn");
    const startGameBtn = document.getElementById("startGameBtn");

    const replayOverlay = document.getElementById("replayOverlay");
    const replayContent = document.getElementById("replayContent");
    const closeReplayBtn = document.getElementById("closeReplayBtn");

    let username = null;
    let myColor = randomNiceColor();
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentColor = colorPicker.value;
    let currentSize = parseInt(brushSize.value, 10);
    let currentTool = "pen";
    let cursors = {};
    let onlineUsers = {};
    let rooms = {};

    let gamePhase = "free"; // free | prompt | draw | guess | reveal
    let turnIndex = 0;
    let playersOrdered = [];
    let chains = {};
    let stepsSubmitted = {};

    drawCtx.lineJoin = "round";
    drawCtx.lineCap = "round";
    drawCtx.strokeStyle = currentColor;
    drawCtx.lineWidth = currentSize;

    function joinWithName() {
      const name = usernameInput.value.trim();
      if (!name) return;
      username = name;
      const id = "user_" + name + "_" + Math.floor(Math.random() * 1e5);
      pubnub.setUUID(id);
      loginOverlay.style.display = "none";
      userLabel.textContent = "You are: " + name + " (color used in chat & cursors)";
      pubnub.subscribe({ channels: [LOBBY_CHANNEL] });
      info.textContent = "In lobby. Choose or create a room.";
    }
    joinBtn.addEventListener("click", joinWithName);
    usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") joinWithName(); });

    function renderRoomList() {
      roomListDiv.innerHTML = "";
      const names = Object.keys(rooms);
      if (names.length === 0) {
        const empty = document.createElement("div");
        empty.textContent = "No rooms yet. Create one!";
        empty.style.color = "#aaa";
        roomListDiv.appendChild(empty);
        return;
      }
      names.forEach(name => {
        const row = document.createElement("div");
        row.className = "roomRow";
        const left = document.createElement("div");
        const rn = document.createElement("span");
        rn.className = "roomName";
        rn.textContent = name;
        const meta = document.createElement("span");
        meta.style.fontSize = "12px";
        meta.style.color = "#aaa";
        meta.textContent = "  by " + (rooms[name].createdBy || "someone");
        left.appendChild(rn);
        left.appendChild(meta);

        const joinBtnEl = document.createElement("button");
        joinBtnEl.textContent = "Join";
        joinBtnEl.className = "primary";
        joinBtnEl.addEventListener("click", () => joinRoom(name));

        row.appendChild(left);
        row.appendChild(joinBtnEl);
        roomListDiv.appendChild(row);
      });
    }

    function createRoom() {
      const name = newRoomInput.value.trim();
      if (!name) return;
      newRoomInput.value = "";
      const safeName = name.replace(/[^\w\-]/g, "").toLowerCase();
      if (!safeName) return;
      if (!rooms[safeName]) {
        rooms[safeName] = { createdBy: username, createdAt: Date.now() };
        pubnub.publish({ channel: LOBBY_CHANNEL, message: { type: "room-create", room: safeName, createdBy: username } });
        renderRoomList();
      }
      joinRoom(safeName);
    }
    createRoomBtn.addEventListener("click", createRoom);
    newRoomInput.addEventListener("keydown", e => { if (e.key === "Enter") createRoom(); });

    function joinRoom(roomName) {
      CURRENT_ROOM = roomName;
      ROOM_CHANNEL = "joint-drawing-canvas-" + roomName;
      lobbyScreen.style.display = "none";
      appScreen.style.display = "flex";
      info.textContent = "Connecting to room...";
      roomLabel.textContent = "Room: " + roomName;

      cursors = {};
      onlineUsers = {};
      clearDrawCanvas();
      clearCursorCanvas();
      chatBox.innerHTML = "";
      onlineList.innerHTML = "";
      resetGameState();

      pubnub.subscribe({ channels: [ROOM_CHANNEL], withPresence: true });
      pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "join", username, color: myColor } });
      addChatMessage("System", username + " joined room " + roomName, true);
    }

    function leaveRoom() {
      if (ROOM_CHANNEL) pubnub.unsubscribe({ channels: [ROOM_CHANNEL] });
      ROOM_CHANNEL = null;
      CURRENT_ROOM = null;
      appScreen.style.display = "none";
      lobbyScreen.style.display = "flex";
      info.textContent = "In lobby. Choose or create a room.";
      resetGameState();
    }
    backToLobbyBtn.addEventListener("click", leaveRoom);

    function addChatMessage(user, text, isSystem = false, color = "#f5f5f5") {
      const div = document.createElement("div");
      div.className = "chatMessage";
      if (isSystem) {
        div.classList.add("chatSystem");
        div.textContent = text;
      } else {
        const nameSpan = document.createElement("span");
        nameSpan.className = "chatUser";
        nameSpan.style.color = color;
        nameSpan.textContent = user + ": ";
        const textSpan = document.createElement("span");
        textSpan.textContent = text;
        div.appendChild(nameSpan);
        div.appendChild(textSpan);
      }
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      // track "online" by activity (fallback)
      const id = pubnub.getUUID();
      onlineUsers[id] = { username: user, color };
      renderOnlineList();
    }
    function sendChat() {
      const msg = chatInput.value.trim();
      if (!msg || !username || !ROOM_CHANNEL) return;
      chatInput.value = "";
      pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "chat", username, color: myColor, text: msg } });
      addChatMessage(username, msg, false, myColor);
    }
    sendChatBtn.addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); sendChat(); } });

    function renderOnlineList() {
      onlineList.innerHTML = "";
      Object.keys(onlineUsers).forEach(uuid => {
        const u = onlineUsers[uuid];
        const row = document.createElement("div");
        row.className = "onlineUser";
        const dot = document.createElement("div");
        dot.className = "onlineColorDot";
        dot.style.backgroundColor = u.color || "#4cd137";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = u.username || uuid;
        row.appendChild(dot);
        row.appendChild(nameSpan);
        onlineList.appendChild(row);
      });
    }

    function randomNiceColor() {
      const colors = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#e84393", "#00cec9", "#fd79a8", "#6c5ce7", "#00b894"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function clearDrawCanvas() {
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    }
    function clearCursorCanvas() {
      cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    }
    function getOffsetPos(e) {
      const rect = drawCanvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function drawSegment(data, fromRemote = false) {
      drawCtx.save();
      drawCtx.lineWidth = data.size;
      drawCtx.lineCap = "round";
      drawCtx.lineJoin = "round";
      drawCtx.strokeStyle = data.tool === "eraser" ? "#ffffff" : data.color;
      drawCtx.beginPath();
      drawCtx.moveTo(data.lastX, data.lastY);
      drawCtx.lineTo(data.x, data.y);
      drawCtx.stroke();
      drawCtx.restore();

      if (!fromRemote && ROOM_CHANNEL) {
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "stroke",
          x: data.x,
          y: data.y,
          lastX: data.lastX,
          lastY: data.lastY,
          color: data.color,
          size: data.size,
          tool: data.tool
        }});
      }
    }

    function drawCursors() {
      clearCursorCanvas();
      const now = Date.now();
      Object.keys(cursors).forEach(id => {
        const c = cursors[id];
        if (now - c.lastSeen > 8000) { delete cursors[id]; return; }
        const x = c.x, y = c.y;
        const radius = (c.size || 4) / 2 + 3;
        cursorCtx.save();
        cursorCtx.beginPath();
        cursorCtx.strokeStyle = c.color;
        cursorCtx.lineWidth = 1.5;
        cursorCtx.arc(x, y, radius, 0, Math.PI*2);
        cursorCtx.stroke();
        cursorCtx.restore();

        cursorCtx.save();
        cursorCtx.font = "12px sans-serif";
        cursorCtx.fillStyle = c.color;
        cursorCtx.strokeStyle = "#ffffff";
        cursorCtx.lineWidth = 3;
        cursorCtx.textBaseline = "top";
        const text = c.username || "Player";
        cursorCtx.strokeText(text, x+radius+4, y+radius+2);
        cursorCtx.fillText(text, x+radius+4, y+radius+2);
        cursorCtx.restore();
      });
    }
    function updateLocalCursor(x, y) {
      if (!ROOM_CHANNEL) return;
      const id = pubnub.getUUID();
      cursors[id] = { x, y, username, color: myColor, size: currentSize, lastSeen: Date.now() };
      pubnub.publish({ channel: ROOM_CHANNEL, message: {
        type: "cursor", x, y, username, color: myColor, size: currentSize
      }});
      drawCursors();
    }

    function spawnFloatingEmoji(emoji) {
      const el = document.createElement("div");
      el.className = "floating-emoji";
      el.textContent = emoji;
      const startX = Math.random()*window.innerWidth*0.8 + window.innerWidth*0.1;
      const startY = window.innerHeight - 60;
      el.style.left = startX + "px";
      el.style.top = startY + "px";
      document.body.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    }
    emojiButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (!ROOM_CHANNEL || !username) return;
        const emoji = btn.dataset.emoji;
        pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "reaction", emoji, username } });
        spawnFloatingEmoji(emoji);
      });
    });

    colorPicker.addEventListener("input", () => {
      currentColor = colorPicker.value;
      if (currentTool === "pen") drawCtx.strokeStyle = currentColor;
    });
    brushSize.addEventListener("input", () => {
      currentSize = parseInt(brushSize.value, 10);
      brushSizeValue.textContent = currentSize;
      drawCtx.lineWidth = currentSize;
    });
    penBtn.addEventListener("click", () => {
      currentTool = "pen";
      drawCtx.strokeStyle = currentColor;
      penBtn.classList.add("active");
      eraserBtn.classList.remove("active");
    });
    eraserBtn.addEventListener("click", () => {
      currentTool = "eraser";
      drawCtx.strokeStyle = "#ffffff";
      penBtn.classList.remove("active");
      eraserBtn.classList.add("active");
    });
    eraseAllBtn.addEventListener("click", () => {
      if (!ROOM_CHANNEL) return;
      clearDrawCanvas();
      pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "clear" } });
    });

    downloadBtn.addEventListener("click", () => {
      const dataURL = drawCanvas.toDataURL("image/png");
      const link = document.createElement("a");
      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      link.download = "canvas-" + (CURRENT_ROOM||"room") + "-" + timestamp + ".png";
      link.href = dataURL;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    drawCanvas.addEventListener("mousedown", e => {
      if (!username || !ROOM_CHANNEL) return;
      isDrawing = true;
      const pos = getOffsetPos(e);
      lastX = pos.x; lastY = pos.y;
    });
    drawCanvas.addEventListener("mousemove", e => {
      if (!username || !ROOM_CHANNEL) return;
      const pos = getOffsetPos(e);
      updateLocalCursor(pos.x, pos.y);
      if (!isDrawing) return;
      drawSegment({ x: pos.x, y: pos.y, lastX, lastY, color: currentColor, size: currentSize, tool: currentTool });
      lastX = pos.x; lastY = pos.y;
    });
    ["mouseup","mouseleave"].forEach(ev =>
      drawCanvas.addEventListener(ev, () => { isDrawing = false; })
    );
    drawCanvas.addEventListener("touchstart", e => {
      if (!username || !ROOM_CHANNEL) return;
      e.preventDefault();
      isDrawing = true;
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);
      lastX = pos.x; lastY = pos.y;
      updateLocalCursor(pos.x, pos.y);
    }, { passive:false });
    drawCanvas.addEventListener("touchmove", e => {
      if (!username || !ROOM_CHANNEL) return;
      e.preventDefault();
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);
      updateLocalCursor(pos.x, pos.y);
      if (!isDrawing) return;
      drawSegment({ x: pos.x, y: pos.y, lastX, lastY, color: currentColor, size: currentSize, tool: currentTool });
      lastX = pos.x; lastY = pos.y;
    }, { passive:false });
    drawCanvas.addEventListener("touchend", () => { isDrawing = false; });

    // ===== GAME =====
    function resetGameState() {
      gamePhase = "free";
      turnIndex = 0;
      playersOrdered = [];
      chains = {};
      stepsSubmitted = {};
      updateGameUI();
    }
    function updateGameUI() {
      promptInput.style.display = "none";
      guessInput.style.display = "none";
      submitStepBtn.style.display = "none";
      promptInput.value = "";
      guessInput.value = "";

      if (gamePhase === "free") {
        phaseLabel.textContent = "Phase: Free draw";
        gameHint.textContent = "Anyone can click 'Start Mini Gartic Game'.";
      } else if (gamePhase === "prompt") {
        phaseLabel.textContent = "Phase: Write prompts";
        gameHint.textContent = "Type a funny prompt. Everyone writes one.";
        promptInput.style.display = "block";
        submitStepBtn.style.display = "block";
        submitStepBtn.textContent = "Submit prompt";
      } else if (gamePhase === "draw") {
        phaseLabel.textContent = "Phase: Draw";
        gameHint.textContent = "Draw the prompt assigned to you (conceptually).";
        submitStepBtn.style.display = "block";
        submitStepBtn.textContent = "Submit drawing";
      } else if (gamePhase === "guess") {
        phaseLabel.textContent = "Phase: Guess";
        gameHint.textContent = "Guess what this drawing is.";
        guessInput.style.display = "block";
        submitStepBtn.style.display = "block";
        submitStepBtn.textContent = "Submit guess";
      } else if (gamePhase === "reveal") {
        phaseLabel.textContent = "Phase: Replay";
        gameHint.textContent = "Viewing the chains.";
      }
    }

    startGameBtn.addEventListener("click", () => {
      if (!ROOM_CHANNEL) return;
      // build players from recent onlineUsers snapshot (fallback)
      playersOrdered = Object.values(onlineUsers)
        .map(u => u.username)
        .filter(Boolean);
      if (playersOrdered.length < 2) {
        addChatMessage("System", "Need at least 2 players to start the game.", true);
        return;
      }
      chains = {};
      playersOrdered.forEach(name => { chains[name] = []; });
      stepsSubmitted = {};
      gamePhase = "prompt";
      turnIndex = 0;
      pubnub.publish({ channel: ROOM_CHANNEL, message: {
        type: "game-phase-change",
        phase: gamePhase,
        turnIndex,
        playersOrdered
      }});
      updateGameUI();
    });

    submitStepBtn.addEventListener("click", () => {
      if (!ROOM_CHANNEL || gamePhase==="free" || gamePhase==="reveal") return;
      if (stepsSubmitted[username]) return;

      if (gamePhase === "prompt") {
        const text = promptInput.value.trim();
        if (!text) return;
        stepsSubmitted[username] = true;
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-step",
          stepType: "prompt",
          chainOwner: username,
          fromUser: username,
          text
        }});
      } else if (gamePhase === "draw") {
        const dataUrl = drawCanvas.toDataURL("image/png");
        const chainOwner = getAssignedChainOwnerForCurrentStep(username);
        if (!chainOwner) return;
        stepsSubmitted[username] = true;
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-step",
          stepType: "drawing",
          chainOwner,
          fromUser: username,
          image: dataUrl
        }});
      } else if (gamePhase === "guess") {
        const text = guessInput.value.trim();
        const chainOwner = getAssignedChainOwnerForCurrentStep(username);
        if (!text || !chainOwner) return;
        stepsSubmitted[username] = true;
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-step",
          stepType: "guess",
          chainOwner,
          fromUser: username,
          text
        }});
      }
      updateGameUI();
    });

    function getAssignedChainOwnerForCurrentStep(playerName) {
      if (!playersOrdered.length) return null;
      const idx = playersOrdered.indexOf(playerName);
      if (idx === -1) return null;
      const shift = turnIndex; // 1 => +1, 2 => +2
      const ownerIndex = (idx + shift) % playersOrdered.length;
      return playersOrdered[ownerIndex];
    }

    function maybeAdvancePhase() {
      const allSubmitted = playersOrdered.every(p => stepsSubmitted[p]);
      if (!allSubmitted) return;

      if (gamePhase === "prompt") {
        gamePhase = "draw";
        turnIndex = 1;
        stepsSubmitted = {};
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-phase-change",
          phase: gamePhase,
          turnIndex,
          playersOrdered
        }});
        pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "clear" } });
      } else if (gamePhase === "draw") {
        gamePhase = "guess";
        turnIndex = 2;
        stepsSubmitted = {};
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-phase-change",
          phase: gamePhase,
          turnIndex,
          playersOrdered
        }});
        pubnub.publish({ channel: ROOM_CHANNEL, message: { type: "clear" } });
      } else if (gamePhase === "guess") {
        gamePhase = "reveal";
        turnIndex = 3;
        stepsSubmitted = {};
        pubnub.publish({ channel: ROOM_CHANNEL, message: {
          type: "game-phase-change",
          phase: gamePhase,
          turnIndex,
          playersOrdered,
          chains
        }});
      }
    }

    function showReplay(receivedChains) {
      replayContent.innerHTML = "";
      const owners = Object.keys(receivedChains || {});
      if (!owners.length) {
        const p = document.createElement("p");
        p.textContent = "No chains to show.";
        replayContent.appendChild(p);
      } else {
        owners.forEach(owner => {
          const chainDiv = document.createElement("div");
          chainDiv.className = "replayChain";
          const title = document.createElement("div");
          title.textContent = "Chain of " + owner;
          title.style.fontWeight = "bold";
          chainDiv.appendChild(title);
          (receivedChains[owner] || []).forEach(step => {
            if (step.type === "prompt") {
              const d = document.createElement("div");
              d.className = "replayStepPrompt";
              d.textContent = "Prompt ("+step.fromUser+"): " + step.text;
              chainDiv.appendChild(d);
            } else if (step.type === "guess") {
              const d = document.createElement("div");
              d.className = "replayStepGuess";
              d.textContent = "Guess ("+step.fromUser+"): " + step.text;
              chainDiv.appendChild(d);
            } else if (step.type === "drawing") {
              const img = document.createElement("img");
              img.className = "replayImage";
              img.src = step.image;
              img.alt = "Drawing by " + step.fromUser;
              chainDiv.appendChild(img);
            }
          });
          replayContent.appendChild(chainDiv);
        });
      }
      replayOverlay.style.display = "flex";
      gamePhase = "reveal";
      updateGameUI();
    }
    closeReplayBtn.addEventListener("click", () => {
      replayOverlay.style.display = "none";
      gamePhase = "free";
      turnIndex = 0;
      updateGameUI();
    });

    pubnub.addListener({
      message: (event) => {
        const msg = event.message;
        if (event.channel === LOBBY_CHANNEL) {
          if (msg.type === "room-create" && msg.room) {
            if (!rooms[msg.room]) {
              rooms[msg.room] = { createdBy: msg.createdBy || "someone", createdAt: Date.now() };
              renderRoomList();
            }
          }
          return;
        }
        if (ROOM_CHANNEL && event.channel === ROOM_CHANNEL) {
          if (msg.type === "stroke") {
            drawSegment(msg, true);
          } else if (msg.type === "clear") {
            clearDrawCanvas();
          } else if (msg.type === "cursor") {
            const id = event.publisher || event.timetoken || "remote";
            cursors[id] = {
              x: msg.x, y: msg.y,
              username: msg.username || "Player",
              color: msg.color || "#ff4757",
              size: msg.size || 4,
              lastSeen: Date.now()
            };
            drawCursors();
          } else if (msg.type === "chat") {
            if (msg.username !== username) {
              addChatMessage(msg.username, msg.text, false, msg.color || "#f5f5f5");
            }
          } else if (msg.type === "join") {
            if (msg.username !== username) {
              addChatMessage("System", msg.username + " joined the room.", true);
            }
          } else if (msg.type === "reaction") {
            spawnFloatingEmoji(msg.emoji || "✨");
          } else if (msg.type === "game-phase-change") {
            gamePhase = msg.phase;
            turnIndex = msg.turnIndex || 0;
            playersOrdered = msg.playersOrdered || playersOrdered;
            if (msg.chains) chains = msg.chains;
            stepsSubmitted = {};
            updateGameUI();
            if (gamePhase === "reveal") showReplay(chains);
          } else if (msg.type === "game-step") {
            if (!chains[msg.chainOwner]) chains[msg.chainOwner] = [];
            chains[msg.chainOwner].push({
              type: msg.stepType,
              text: msg.text,
              image: msg.image,
              fromUser: msg.fromUser
            });
            stepsSubmitted[msg.fromUser] = true;
            maybeAdvancePhase();
          }
        }
      },
      presence: (event) => {
        // Best-effort presence, not required for game
        if (!ROOM_CHANNEL || event.channel !== ROOM_CHANNEL) return;
        const uuid = event.uuid;
        if (event.action === "join" || event.action === "state-change") {
          if (!onlineUsers[uuid]) {
            onlineUsers[uuid] = { username: uuid, color: randomNiceColor() };
          }
        } else if (event.action === "leave" || event.action === "timeout") {
          delete onlineUsers[uuid];
        }
        renderOnlineList();
      },
      status: (s) => {
        if (s.category === "PNConnectedCategory") {
          if (s.affectedChannels && s.affectedChannels.includes(LOBBY_CHANNEL)) {
            info.textContent = "In lobby. Choose or create a room.";
          } else if (ROOM_CHANNEL && s.affectedChannels && s.affectedChannels.includes(ROOM_CHANNEL)) {
            info.textContent = "Connected to room.";
          }
        }
      }
    });
  </script>
</body>
</html>
