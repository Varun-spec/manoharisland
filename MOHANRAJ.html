<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Joint Drawing Canvas</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: sans-serif;
      text-align: center;
      background: #1f1f1f;
      color: #f5f5f5;
    }
    h1 {
      margin-top: 10px;
    }
    #topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    #topbar > * {
      margin: 2px;
    }
    #canvasWrapper {
      position: relative;
      display: inline-block;
    }
    #drawCanvas, #cursorCanvas {
      border: 2px solid #555;
      background: #ffffff;
      border-radius: 4px;
      touch-action: none;
      display: block;
    }
    #cursorCanvas {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none; /* so mouse events hit drawCanvas */
      background: transparent;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      background: #333;
      color: #f5f5f5;
      transition: background 0.15s ease;
    }
    button.active {
      background: #007bff;
    }
    button:hover {
      background: #444;
    }
    #colorPicker {
      width: 40px;
      height: 32px;
      padding: 0;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    #brushSize {
      width: 100px;
    }
    label {
      font-size: 13px;
    }
    #info {
      margin-top: 6px;
      font-size: 13px;
      color: #ccc;
    }
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #loginBox {
      background: #222;
      padding: 20px 24px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      max-width: 300px;
      width: 90%;
    }
    #loginBox h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    #usernameInput {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #555;
      font-size: 14px;
      box-sizing: border-box;
    }
    #loginBox button {
      width: 100%;
      margin-top: 4px;
    }
    #userLabel {
      font-size: 13px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <!-- Username overlay -->
  <div id="loginOverlay">
    <div id="loginBox">
      <h2>Join the canvas</h2>
      <p>Enter a username so others can see you:</p>
      <input id="usernameInput" type="text" placeholder="e.g. Aryan" maxlength="20">
      <button id="joinBtn">Join</button>
    </div>
  </div>

  <h1>Joint Drawing Canvas</h1>
  <p id="userLabel"></p>

  <div id="topbar">
    <label>
      Color
      <input type="color" id="colorPicker" value="#000000">
    </label>

    <label>
      Brush size
      <input type="range" id="brushSize" min="1" max="40" value="4">
      <span id="brushSizeValue">4</span> px
    </label>

    <button id="penBtn" class="active">Pen</button>
    <button id="eraserBtn">Eraser</button>
    <button id="eraseAllBtn">Erase All</button>
  </div>

  <div id="canvasWrapper">
    <canvas id="drawCanvas" width="900" height="520"></canvas>
    <canvas id="cursorCanvas" width="900" height="520"></canvas>
  </div>

  <div id="info">Enter a username to start.</div>

  <!-- PubNub realtime library -->
  <script src="https://cdn.jsdelivr.net/npm/pubnub@7.5.0/dist/web/pubnub.min.js"></script>
  <script>
    // ====== CONFIG: put your PubNub keys here ======
    const pubnub = new PubNub({
      publishKey:   "pub-c-fc766aca-9661-4f55-bc9a-667c55e2b5c1",   // TODO: replace
      subscribeKey: "sub-c-1dd042db-ecfa-47ad-8d2c-4ecb39394c0b",   // TODO: replace
      uuid: "temp_" + Math.floor(Math.random() * 1e9)
    });

    const channel = "joint-drawing-canvas-v4";

    // ====== DOM REFERENCES ======
    const drawCanvas = document.getElementById("drawCanvas");
    const drawCtx = drawCanvas.getContext("2d");

    const cursorCanvas = document.getElementById("cursorCanvas");
    const cursorCtx = cursorCanvas.getContext("2d");

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const brushSizeValue = document.getElementById("brushSizeValue");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const eraseAllBtn = document.getElementById("eraseAllBtn");
    const info = document.getElementById("info");
    const userLabel = document.getElementById("userLabel");

    const loginOverlay = document.getElementById("loginOverlay");
    const usernameInput = document.getElementById("usernameInput");
    const joinBtn = document.getElementById("joinBtn");

    // ====== STATE ======
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentColor = colorPicker.value;
    let currentSize = parseInt(brushSize.value, 10);
    let currentTool = "pen"; // "pen" or "eraser"

    let username = null;
    let myColor = randomNiceColor();
    let cursors = {}; // id -> { x, y, username, color, lastSeen }

    // Brush defaults
    drawCtx.lineJoin = "round";
    drawCtx.lineCap = "round";
    drawCtx.strokeStyle = currentColor;
    drawCtx.lineWidth = currentSize;

    // ====== LOGIN / USERNAME ======
    function joinWithName() {
      const name = usernameInput.value.trim();
      if (!name) return;
      username = name;
      pubnub.setUUID("user_" + name + "_" + Math.floor(Math.random() * 1e5));
      userLabel.textContent = "You are: " + name + " (cursor color: " + myColor + ")";
      loginOverlay.style.display = "none";
      info.textContent = "Connected! Share this page URL with friends.";
      sendMessage({ type: "join", username: name, color: myColor });
    }

    joinBtn.addEventListener("click", joinWithName);
    usernameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinWithName();
    });

    // ====== UI HANDLERS ======
    colorPicker.addEventListener("input", () => {
      currentColor = colorPicker.value;
      if (currentTool === "pen") {
        drawCtx.strokeStyle = currentColor;
      }
    });

    brushSize.addEventListener("input", () => {
      currentSize = parseInt(brushSize.value, 10);
      brushSizeValue.textContent = currentSize;
      drawCtx.lineWidth = currentSize;
    });

    penBtn.addEventListener("click", () => {
      currentTool = "pen";
      drawCtx.strokeStyle = currentColor;
      penBtn.classList.add("active");
      eraserBtn.classList.remove("active");
    });

    eraserBtn.addEventListener("click", () => {
      currentTool = "eraser";
      drawCtx.strokeStyle = "#ffffff";
      penBtn.classList.remove("active");
      eraserBtn.classList.add("active");
    });

    eraseAllBtn.addEventListener("click", () => {
      clearDrawCanvas();
      sendMessage({ type: "clear" });
    });

    // ====== HELPERS ======
    function clearDrawCanvas() {
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    }

    function clearCursorCanvas() {
      cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    }

    function getOffsetPos(e) {
      const rect = drawCanvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function randomNiceColor() {
      const colors = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#e84393", "#00cec9", "#fd79a8", "#6c5ce7", "#00b894"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // ====== DRAWING SEGMENTS (only on drawCanvas) ======
    function drawSegment(data, fromRemote = false) {
      drawCtx.save();
      drawCtx.lineWidth = data.size;
      drawCtx.lineCap = "round";
      drawCtx.lineJoin = "round";
      drawCtx.strokeStyle = data.tool === "eraser" ? "#ffffff" : data.color;

      drawCtx.beginPath();
      drawCtx.moveTo(data.lastX, data.lastY);
      drawCtx.lineTo(data.x, data.y);
      drawCtx.stroke();
      drawCtx.restore();

      if (!fromRemote) {
        sendMessage({
          type: "stroke",
          x: data.x,
          y: data.y,
          lastX: data.lastX,
          lastY: data.lastY,
          color: data.color,
          size: data.size,
          tool: data.tool
        });
      }
    }

    // ====== CURSOR DRAWING (only on cursorCanvas) ======
    function drawCursors() {
      clearCursorCanvas();
      const now = Date.now();

      Object.keys(cursors).forEach((id) => {
        const c = cursors[id];
        if (now - c.lastSeen > 8000) {
          delete cursors[id];
          return;
        }

        const x = c.x;
        const y = c.y;

        // cursor circle
        cursorCtx.save();
        cursorCtx.beginPath();
        cursorCtx.strokeStyle = c.color;
        cursorCtx.lineWidth = 1.5;
        cursorCtx.arc(x, y, 6, 0, Math.PI * 2);
        cursorCtx.stroke();
        cursorCtx.restore();

        // username label
        cursorCtx.save();
        cursorCtx.font = "12px sans-serif";
        cursorCtx.fillStyle = c.color;
        cursorCtx.strokeStyle = "#ffffff";
        cursorCtx.lineWidth = 3;
        cursorCtx.textBaseline = "top";

        const text = c.username || "Player";

        cursorCtx.strokeText(text, x + 10, y + 8);
        cursorCtx.fillText(text, x + 10, y + 8);
        cursorCtx.restore();
      });
    }

    function updateLocalCursor(x, y) {
      const id = pubnub.getUUID();
      cursors[id] = {
        x,
        y,
        username,
        color: myColor,
        lastSeen: Date.now()
      };

      sendMessage({
        type: "cursor",
        x,
        y,
        username,
        color: myColor
      });

      drawCursors();
    }

    // ====== MOUSE EVENTS ======
    drawCanvas.addEventListener("mousedown", (e) => {
      if (!username) return;
      isDrawing = true;
      const pos = getOffsetPos(e);
      lastX = pos.x;
      lastY = pos.y;
    });

    drawCanvas.addEventListener("mousemove", (e) => {
      if (!username) return;
      const pos = getOffsetPos(e);

      updateLocalCursor(pos.x, pos.y);

      if (!isDrawing) return;

      drawSegment({
        x: pos.x,
        y: pos.y,
        lastX,
        lastY,
        color: currentColor,
        size: currentSize,
        tool: currentTool
      });

      lastX = pos.x;
      lastY = pos.y;
    });

    ["mouseup", "mouseleave"].forEach(ev =>
      drawCanvas.addEventListener(ev, () => { isDrawing = false; })
    );

    // ====== TOUCH SUPPORT ======
    drawCanvas.addEventListener("touchstart", (e) => {
      if (!username) return;
      e.preventDefault();
      isDrawing = true;
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);
      lastX = pos.x;
      lastY = pos.y;
      updateLocalCursor(pos.x, pos.y);
    }, { passive: false });

    drawCanvas.addEventListener("touchmove", (e) => {
      if (!username) return;
      e.preventDefault();
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);

      updateLocalCursor(pos.x, pos.y);

      if (!isDrawing) return;

      drawSegment({
        x: pos.x,
        y: pos.y,
        lastX,
        lastY,
        color: currentColor,
        size: currentSize,
        tool: currentTool
      });

      lastX = pos.x;
      lastY = pos.y;
    }, { passive: false });

    drawCanvas.addEventListener("touchend", () => {
      isDrawing = false;
    });

    // ====== PUBNUB ======
    function sendMessage(msg) {
      pubnub.publish({
        channel,
        message: msg
      });
    }

    pubnub.addListener({
      message: (event) => {
        const msg = event.message;

        if (msg.type === "stroke") {
          drawSegment(msg, true);
        } else if (msg.type === "clear") {
          clearDrawCanvas();
        } else if (msg.type === "cursor") {
          const id = event.publisher || event.timetoken || "remote";
          cursors[id] = {
            x: msg.x,
            y: msg.y,
            username: msg.username || "Player",
            color: msg.color || "#ff4757",
            lastSeen: Date.now()
          };
          drawCursors();
        }
      },
      status: (s) => {
        if (s.category === "PNConnectedCategory") {
          if (!username) {
            info.textContent = "Enter a username to start.";
          } else {
            info.textContent = "Connected! Share this page URL with friends.";
          }
        }
      }
    });

    pubnub.subscribe({ channels: [channel] });
  </script>
</body>
</html>
