<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Varuns diddy drawing</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: sans-serif;
      text-align: center;
      background: #1f1f1f;
      color: #f5f5f5;
    }
    h1 {
      margin-top: 10px;
    }
    #topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    #topbar > * {
      margin: 2px;
    }
    canvas {
      border: 2px solid #555;
      background: #ffffff;
      cursor: crosshair;
      border-radius: 4px;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      background: #333;
      color: #f5f5f5;
      transition: background 0.15s ease;
    }
    button.active {
      background: #007bff;
    }
    button:hover {
      background: #444;
    }
    #colorPicker {
      width: 40px;
      height: 32px;
      padding: 0;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    #brushSize {
      width: 100px;
    }
    label {
      font-size: 13px;
    }
    #info {
      margin-top: 6px;
      font-size: 13px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>Diddy Drawings</h1>
  <p>Very high tech and good design software by varun</p>

  <div id="topbar">
    <label>
      Color
      <input type="color" id="colorPicker" value="#000000">
    </label>

    <label>
      Brush size
      <input type="range" id="brushSize" min="1" max="40" value="4">
      <span id="brushSizeValue">4</span> px
    </label>

    <button id="penBtn" class="active">Pen</button>
    <button id="eraserBtn">Eraser</button>
    <button id="eraseAllBtn">Erase All</button>
  </div>

  <canvas id="canvas" width="800" height="500"></canvas>
  <div id="info">Connecting…</div>

  <!-- PubNub realtime library -->
  <script src="https://cdn.jsdelivr.net/npm/pubnub@7.5.0/dist/web/pubnub.min.js"></script>
  <script>
    // ====== CONFIG: put your PubNub keys here ======
    const pubnub = new PubNub({
      publishKey:   "pub-c-fc766aca-9661-4f55-bc9a-667c55e2b5c1",   // TODO: replace
      subscribeKey: "sub-c-1dd042db-ecfa-47ad-8d2c-4ecb39394c0b",   // TODO: replace
      uuid: "player_" + Math.floor(Math.random() * 1e9)
    });

    const channel = "joint-drawing-canvas-v2";

    // ====== DOM REFERENCES ======
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const brushSizeValue = document.getElementById("brushSizeValue");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const eraseAllBtn = document.getElementById("eraseAllBtn");
    const info = document.getElementById("info");

    // ====== STATE ======
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentColor = colorPicker.value;
    let currentSize = parseInt(brushSize.value, 10);
    let currentTool = "pen"; // "pen" or "eraser"

    // Default brush settings
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = currentSize;

    // ====== UI HANDLERS ======
    colorPicker.addEventListener("input", () => {
      currentColor = colorPicker.value;
      if (currentTool === "pen") {
        ctx.strokeStyle = currentColor;
      }
    });

    brushSize.addEventListener("input", () => {
      currentSize = parseInt(brushSize.value, 10);
      brushSizeValue.textContent = currentSize;
      ctx.lineWidth = currentSize;
    });

    penBtn.addEventListener("click", () => {
      currentTool = "pen";
      ctx.strokeStyle = currentColor;
      penBtn.classList.add("active");
      eraserBtn.classList.remove("active");
    });

    eraserBtn.addEventListener("click", () => {
      currentTool = "eraser";
      // Eraser just draws with white (canvas background)
      ctx.strokeStyle = "#ffffff";
      penBtn.classList.remove("active");
      eraserBtn.classList.add("active");
    });

    eraseAllBtn.addEventListener("click", () => {
      clearCanvas();
      // Broadcast clear to everyone
      sendMessage({ type: "clear" });
    });

    // ====== CANVAS DRAW HELPERS ======
    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function drawSegment(data, fromRemote = false) {
      ctx.save();
      ctx.lineWidth = data.size;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = data.tool === "eraser" ? "#ffffff" : data.color;

      ctx.beginPath();
      ctx.moveTo(data.lastX, data.lastY);
      ctx.lineTo(data.x, data.y);
      ctx.stroke();
      ctx.restore();

      if (!fromRemote) {
        // Only send when this stroke originated locally
        sendMessage({
          type: "stroke",
          x: data.x,
          y: data.y,
          lastX: data.lastX,
          lastY: data.lastY,
          color: data.color,
          size: data.size,
          tool: data.tool
        });
      }
    }

    function getOffsetPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    // ====== MOUSE EVENTS ======
    canvas.addEventListener("mousedown", (e) => {
      isDrawing = true;
      const pos = getOffsetPos(e);
      lastX = pos.x;
      lastY = pos.y;
    });

    canvas.addEventListener("mousemove", (e) => {
      if (!isDrawing) return;
      const pos = getOffsetPos(e);

      drawSegment({
        x: pos.x,
        y: pos.y,
        lastX,
        lastY,
        color: currentColor,
        size: currentSize,
        tool: currentTool
      });

      lastX = pos.x;
      lastY = pos.y;
    });

    ["mouseup", "mouseleave"].forEach(ev =>
      canvas.addEventListener(ev, () => { isDrawing = false; })
    );

    // ====== TOUCH SUPPORT ======
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      isDrawing = true;
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);
      lastX = pos.x;
      lastY = pos.y;
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (!isDrawing) return;
      const touch = e.touches[0];
      const pos = getOffsetPos(touch);

      drawSegment({
        x: pos.x,
        y: pos.y,
        lastX,
        lastY,
        color: currentColor,
        size: currentSize,
        tool: currentTool
      });

      lastX = pos.x;
      lastY = pos.y;
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      isDrawing = false;
    });

    // ====== PUBNUB: SEND / RECEIVE ======
    function sendMessage(msg) {
      pubnub.publish({
        channel,
        message: msg
      });
    }

    pubnub.addListener({
      message: (event) => {
        const msg = event.message;

        if (msg.type === "stroke") {
          drawSegment(msg, true); // fromRemote = true
        } else if (msg.type === "clear") {
          clearCanvas();
        }
      },
      status: (s) => {
        if (s.category === "PNConnectedCategory") {
          info.textContent = "Connected! Share this page URL with friends.";
        }
      }
    });

    pubnub.subscribe({ channels: [channel] });
  </script>
</body>
</html>
